<mat-toolbar color="primary" class="topbar public-topbar">
  <div class="topbar-content">
    <div class="brand">
      <a class="brand-logo" routerLink="/" aria-label="Ir para página inicial">
        <img src="/logo.png" alt="Brasília Racing" class="brand-logo-image" />
      </a>
    </div>

    <nav class="public-nav" aria-label="Categorias">
      @for (category of categories(); track category.id) {
        <a class="nav-item" [routerLink]="['/categorias', category.slug]" routerLinkActive="is-active">{{ category.name }}</a>
      }
    </nav>
  </div>
</mat-toolbar>
