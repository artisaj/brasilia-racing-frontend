<mat-toolbar color="primary">Brasília Racing Admin</mat-toolbar>

<main class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Login administrativo</mat-card-title>
      <mat-card-subtitle>Acesso para admin e redator</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput type="password" formControlName="password" />
        </mat-form-field>

        @if (errorMessage()) {
          <p class="error-text">{{ errorMessage() }}</p>
        }

        <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting()">
          {{ isSubmitting() ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <a mat-stroked-button routerLink="/">Voltar para site público</a>
    </mat-card-actions>
  </mat-card>
</main>
