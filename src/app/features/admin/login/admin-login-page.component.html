<mat-toolbar color="primary" class="topbar">
  <div class="topbar-content">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <h1 class="brand-name">Brasília Racing Admin</h1>
    </div>

    <a mat-stroked-button href="/" target="_blank" rel="noopener noreferrer"
      >Site público <span aria-hidden="true">↗</span></a
    >
  </div>
</mat-toolbar>

<main class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Login administrativo</mat-card-title>
      <mat-card-subtitle>Acesso para perfis admin e redator</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput type="password" formControlName="password" />
        </mat-form-field>

        @if (errorMessage(); as message) {
          <p class="error-text">{{ message }}</p>
        }

        <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting()">
          {{ isSubmitting() ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions></mat-card-actions>
  </mat-card>
</main>
