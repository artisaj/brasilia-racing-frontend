services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brasilia-racing-frontend
    command: npm run start -- --host 0.0.0.0 --port 4200 --poll 1000
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./:/app
      - /app/node_modules
